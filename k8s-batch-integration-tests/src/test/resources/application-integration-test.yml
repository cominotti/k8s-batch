# Integration test profile: overrides for Testcontainers-based testing.
spring:
  batch:
    jdbc:
      # "always" because Testcontainers starts a fresh MySQL with no Spring Batch tables
      initialize-schema: always
    job:
      enabled: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  main:
    # Explicit false prevents lazy init from masking missing beans in tests
    lazy-initialization: false
    # Suppress banner — it writes to System.out before logback filtering is active
    banner-mode: off

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true

batch:
  partition:
    grid-size: 4
    chunk-size: 25
    # Reduced from production's 60s so tests fail fast instead of hanging
    timeout-ms: 15000
  file-range:
    # Empty defaults — required to satisfy @ConfigurationProperties binding;
    # tests override these per-test via JobParameters
    input-file: ""
  multi-file:
    input-directory: ""
  transaction:
    chunk-size: 10
    consumer-group: k8s-batch-transaction-processor-test
    # Reduced from 5s to speed up tests — reader detects end-of-topic faster
    poll-timeout-seconds: 1
    # Enable Kafka transactions in integration tests to validate coordinated DB + Kafka writes
    kafka-transactions-enabled: true
