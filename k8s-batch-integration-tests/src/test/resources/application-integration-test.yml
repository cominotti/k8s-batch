spring:
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    fail-on-missing-locations: true
  main:
    lazy-initialization: false

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true

batch:
  partition:
    grid-size: 4
    chunk-size: 25
    timeout-ms: 15000
  file-range:
    input-file: ""
  multi-file:
    input-directory: ""
