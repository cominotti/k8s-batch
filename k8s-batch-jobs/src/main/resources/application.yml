server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: k8s-batch
  profiles:
    # Default profiles — loads shared RemotePartitioningBaseConfig + Kafka transport.
    # Use --spring.profiles.active=standalone to switch to TaskExecutorPartitionHandler (no broker).
    # Use --spring.profiles.active=remote-partitioning,remote-jms for JMS transport (RabbitMQ/SQS).
    default: remote-partitioning,remote-kafka

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/k8sbatch?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:k8sbatch}
    password: ${SPRING_DATASOURCE_PASSWORD:k8sbatch_secret}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  batch:
    jdbc:
      # Default: always (for local dev). Helm overrides to "never" because the MySQL init
      # ConfigMap creates the Spring Batch DDL before the app starts.
      initialize-schema: ${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA:always}
    job:
      # Prevent auto-launching jobs at startup — jobs are triggered via the REST API
      enabled: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        # Enables separate /actuator/health/liveness and /actuator/health/readiness endpoints
        # for Kubernetes liveness/readiness probes
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # 100% sampling for development. Override to 0.1-0.3 in production via
      # MANAGEMENT_TRACING_SAMPLING_PROBABILITY env var to control trace volume.
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  metrics:
    tags:
      # Enables filtering by application in multi-service Prometheus queries
      application: ${spring.application.name}

# ── Batch Job Configuration ─────────────────────────────────────────────────
# Application-specific batch properties (not Spring's spring.batch.* namespace).
# Bound to: BatchFileProperties (batch.file.*), BatchPartitionProperties (batch.partition.*),
# TransactionJobProperties (batch.transaction.*).
batch:
  file:
    # Path-traversal guard (CWE-22): all job input file paths are validated to reside within
    # this directory. Override with the actual data volume mount path in production
    # (e.g. BATCH_FILE_ALLOWED_BASE_DIR=/data). Defaults to / (system root), which allows
    # any valid absolute path — suitable for local development and integration testing only.
    allowed-base-dir: ${BATCH_FILE_ALLOWED_BASE_DIR:/}
  # ── Partitioning ─────────────────────────────────────────────────────────
  # Controls how CSV ETL jobs split work across workers. In remote mode, partitions are
  # distributed to worker pods via Kafka. In standalone mode, partitions run as local threads.
  partition:
    grid-size: ${BATCH_PARTITION_GRID_SIZE:4}
    chunk-size: ${BATCH_PARTITION_CHUNK_SIZE:100}
    # Remote partitioning manager polling timeout. Standalone mode ignores this
    # (TaskExecutorPartitionHandler has no timeout API — JUnit @Timeout is the backstop).
    timeout-ms: ${BATCH_PARTITION_TIMEOUT_MS:60000}
  # ── Transaction Enrichment Job ───────────────────────────────────────────
  # Kafka-to-MySQL enrichment pipeline (remote-partitioning profile only). Reads Avro
  # TransactionEvent messages, enriches with exchange rate + risk score, writes to both
  # MySQL (idempotent upsert) and a Kafka output topic via CompositeItemWriter.
  transaction:
    input-topic: ${BATCH_TRANSACTION_INPUT_TOPIC:transaction-events}
    output-topic: ${BATCH_TRANSACTION_OUTPUT_TOPIC:enriched-transaction-events}
    consumer-group: ${BATCH_TRANSACTION_CONSUMER_GROUP:k8s-batch-transaction-processor}
    chunk-size: ${BATCH_TRANSACTION_CHUNK_SIZE:100}
    poll-timeout-seconds: ${BATCH_TRANSACTION_POLL_TIMEOUT_SECONDS:5}
    # Enables Kafka transactional producer for coordinated DB + Kafka writes (best-effort 1PC).
    # When true, the producer uses idempotent delivery and transactional commits synchronized
    # with the Spring DataSourceTransactionManager. Disabled by default (~30% slower throughput).
    kafka-transactions-enabled: ${BATCH_TRANSACTION_KAFKA_TRANSACTIONS_ENABLED:false}
  # ── Rules Engine PoC ───────────────────────────────────────────────────
  # CSV-to-DB enrichment job using Drools or EVRete (toggle via engine property).
  # Existing jobs are not modified — this is a standalone PoC for rules engine evaluation.
  rules:
    engine: ${BATCH_RULES_ENGINE:drools}
    chunk-size: ${BATCH_RULES_CHUNK_SIZE:100}
