server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: k8s-batch-crud
  threads:
    virtual:
      enabled: true

  # ── DataSource / HikariCP ──────────────────────────────────────────────
  # Uses its own k8scrud database (database-per-service pattern). The batch service uses k8sbatch.
  # rewriteBatchedStatements=true is critical for MySQL batch INSERT performance with Hibernate.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/k8scrud?useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true}
    username: ${SPRING_DATASOURCE_USERNAME:k8sbatch}
    password: ${SPRING_DATASOURCE_PASSWORD:k8sbatch_secret}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: 30000
      # Logs a warning with stack trace if a connection is held longer than this (leak detection)
      leak-detection-threshold: 60000
      max-lifetime: 1800000
      # Paired with hibernate.connection.provider_disables_autocommit to skip redundant setAutoCommit(false)
      auto-commit: false

  # ── JPA / Hibernate 7.x ────────────────────────────────────────────────
  jpa:
    # CRITICAL: disable Open Session in View — prevents lazy loading outside @Transactional
    open-in-view: false
    hibernate:
      # Validate that entity mappings match the Liquibase-managed schema at startup
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true
        query:
          plan_cache_max_size: 2048
          # Pads IN-clause lists to next power of 2, reducing query plan cache pollution
          in_clause_parameter_padding: true
        connection:
          # HikariCP auto-commit=false means Hibernate can skip setAutoCommit(false) per transaction
          provider_disables_autocommit: true
        generate_statistics: false

  # ── Liquibase ───────────────────────────────────────────────────────────
  # Changelogs are owned by this module (database-per-service pattern)
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  metrics:
    tags:
      application: ${spring.application.name}
