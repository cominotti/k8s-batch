global:
  initSleepSeconds: 1

app:
  replicaCount: 1
  image:
    repository: k8s-batch
    tag: "e2e"
    pullPolicy: Never
  springProfile: remote-partitioning
  podSecurityContext:
    runAsNonRoot: false
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 384Mi
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 45
    periodSeconds: 15
    failureThreshold: 10
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 25
    periodSeconds: 10
    failureThreshold: 10
    timeoutSeconds: 5
  config:
    serverPort: 8080
    batchInitializeSchema: always
    extra:
      BATCH_TRANSACTION_CHUNK_SIZE: "10"
      BATCH_TRANSACTION_KAFKA_TRANSACTIONS_ENABLED: "true"
  extraVolumeMounts:
    - name: test-data
      mountPath: /data/test
      readOnly: true
    - name: test-data-multi
      mountPath: /data/test/multi
      readOnly: true
  extraVolumes:
    - name: test-data
      configMap:
        name: e2e-test-data
    - name: test-data-multi
      configMap:
        name: e2e-test-data-multi

hpa:
  enabled: false

mysql:
  enabled: true
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: Never
  auth:
    rootPassword: e2e_root
    database: k8sbatch
    username: k8sbatch
    password: e2e_pass
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    storageClass: local-path
    size: 1Gi

kafka:
  enabled: true
  image:
    repository: confluentinc/cp-kafka
    tag: "7.9.0"
    pullPolicy: Never
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  persistence:
    storageClass: local-path
    size: 1Gi
  topics:
    partitionRequests:
      name: batch-partition-requests
      partitions: 4
      replicationFactor: 1
    partitionReplies:
      name: batch-partition-replies
      partitions: 4
      replicationFactor: 1
    transactionEvents:
      name: transaction-events
      partitions: 1
      replicationFactor: 1
    enrichedTransactionEvents:
      name: enriched-transaction-events
      partitions: 1
      replicationFactor: 1

schemaRegistry:
  enabled: true
  image:
    repository: confluentinc/cp-schema-registry
    tag: "7.9.0"
    pullPolicy: Never
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Gateway proxies requests to the backend app via Spring Cloud Gateway routes.
# pullPolicy: Never because the image is built locally and loaded into K3s via
# docker save + ctr images import (no registry involved in E2E tests).
# runAsNonRoot: false + runAsUser: 0 because K3s local-path provisioner creates
# volumes owned by root — non-root containers can't write to /tmp.
gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: k8s-batch-api-gateway
    tag: "e2e"
    pullPolicy: Never
  podSecurityContext:
    runAsNonRoot: false
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # Higher thresholds and longer delays than production defaults because K3s
  # single-node performance is slower — the gateway init container waits for
  # the app pod to be ready, which adds to overall startup time.
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 25
    periodSeconds: 15
    failureThreshold: 10
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 10
    timeoutSeconds: 5

# HPA disabled in E2E — single replica is sufficient and avoids resource contention in K3s
gatewayHpa:
  enabled: false

features:
  kafka: true
  schemaRegistry: true
  gateway: true
  hpa: false
  ingress: false
