# Groups E2E test classes by Helm deployment profile to minimize K3s teardown/redeploy
# cycles. Without this, alphabetical ordering causes 2 profile switches (remote -> standalone -> remote);
# with it, there is at most 1 switch (remote -> standalone).
junit.jupiter.testclass.order.default=com.cominotti.k8sbatch.e2e.E2EProfileClassOrderer
