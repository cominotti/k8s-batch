name: Helm Validation

on:
  push:
    paths:
      - 'helm/**'
      - '.github/workflows/helm-validate.yml'
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/helm-validate.yml'
  workflow_dispatch:

jobs:
  lint-and-unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.3  # Pinned — helm-unittest requires Helm 4.x (platformHooks)

      - name: Helm lint
        run: helm lint helm/k8s-batch

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: Run Helm unit tests
        run: helm unittest helm/k8s-batch

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.3

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz -C /usr/local/bin

      - name: Validate manifests against K8s schema
        run: |
          helm template test-release helm/k8s-batch | kubeconform -strict -kubernetes-version 1.30.0 -summary

  k8s-smoke-test:
    runs-on: ubuntu-latest
    needs: [lint-and-unittest, kubeconform]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build application JAR
        run: mvn package -DskipTests -Dskip.checkstyle=true -q

      - name: Build Docker image
        run: docker build -t k8s-batch:test .

      - name: Create K3s cluster
        uses: nolar/setup-k3d-k3s@v1
        with:
          version: v1.30
          k3d-args: --no-lb

      # Pre-pull and import infrastructure images so K3s doesn't pull from the internet
      # during helm install (eliminates network I/O from the deployment timeout window).
      # Image versions must match values.yaml — see CLAUDE.md "CI validation" rule.
      - name: Pre-pull infrastructure images
        run: |
          docker pull mysql:8.4 &
          docker pull confluentinc/cp-kafka:7.9.0 &
          docker pull confluentinc/cp-schema-registry:7.9.0 &
          docker pull busybox:1.36 &
          wait

      - name: Import images into K3s
        run: |
          k3d image import \
            k8s-batch:test \
            mysql:8.4 \
            confluentinc/cp-kafka:7.9.0 \
            confluentinc/cp-schema-registry:7.9.0 \
            busybox:1.36

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.3

      - name: Deploy with Helm
        run: |
          helm install test-release helm/k8s-batch \
            --set app.image.repository=k8s-batch \
            --set app.image.tag=test \
            --set app.image.pullPolicy=Never \
            --set app.replicaCount=1 \
            --set mysql.auth.rootPassword=testroot \
            --set mysql.auth.password=testpass \
            --set kafka.replicaCount=1 \
            --set kafka.topics.partitionRequests.replicationFactor=1 \
            --set kafka.topics.partitionReplies.replicationFactor=1 \
            --set kafka.topics.transactionEvents.replicationFactor=1 \
            --set kafka.topics.enrichedTransactionEvents.replicationFactor=1 \
            --set gateway.enabled=false \
            --set hpa.enabled=false \
            --set gatewayHpa.enabled=false \
            --set features.hpa=false \
            --set features.gateway=false \
            --wait --timeout 15m

      # field-selector excludes Completed Job pods (e.g., kafka-topics) — their Ready
      # condition is False after the container exits, so kubectl wait would always time out.
      - name: Verify pods are ready
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=test-release --field-selector=status.phase=Running --timeout=120s
          kubectl get pods -l app.kubernetes.io/instance=test-release

      - name: Smoke test health endpoint
        run: |
          APP_POD=$(kubectl get pods -l app.kubernetes.io/component=app -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward "$APP_POD" 8080:8080 &
          sleep 5
          curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'
          echo "Health check passed"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -l app.kubernetes.io/instance=test-release -o wide
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp'
          echo "=== App Logs ==="
          kubectl logs -l app.kubernetes.io/component=app --tail=100 || true
          echo "=== MySQL Logs ==="
          kubectl logs -l app.kubernetes.io/component=mysql --tail=50 || true
