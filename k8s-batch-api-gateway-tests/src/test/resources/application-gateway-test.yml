server:
  port: 0  # Random port for tests

gateway:
  backend-url: ${GATEWAY_BACKEND_URL:http://localhost:9999}  # Overridden by WireMockBackendConfig
  rate-limit:
    capacity: 10000  # High default so route and circuit breaker tests never hit the limit.
    period-seconds: 60  # RateLimitIT overrides capacity via @TestPropertySource.
  circuit-breaker-name: batchBackend

# Short thresholds for fast test execution
resilience4j:
  circuitbreaker:
    instances:
      batchBackend:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 5s
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3

spring:
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
