apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "k8s-batch.fullname" . }}-test-connection"
  labels:
    {{- include "k8s-batch.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ include "k8s-batch.fullname" . }}:{{ .Values.app.service.port }}/actuator/health']
