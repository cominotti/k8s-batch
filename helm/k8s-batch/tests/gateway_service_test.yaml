suite: gateway service
templates:
  - templates/gateway/service.yaml
release:
  name: test-release
tests:
  - it: should render when gateway is enabled
    set:
      gateway.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-release-k8s-batch-gateway

  - it: should not render when gateway is disabled
    set:
      gateway.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set port from values
    set:
      gateway.enabled: true
      gateway.service.port: 9090
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: should select gateway component
    set:
      gateway.enabled: true
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: gateway

  - it: should set component label
    set:
      gateway.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: gateway
