suite: gateway deployment
templates:
  - templates/gateway/deployment.yaml
  - templates/gateway/configmap.yaml
release:
  name: test-release
tests:
  - it: should render when gateway is enabled
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-release-k8s-batch-gateway

  - it: should not render when gateway is disabled
    set:
      gateway.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should omit replicas when gateway HPA is enabled
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
      gatewayHpa.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  - it: should set replicas when gateway HPA is disabled
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
      gatewayHpa.enabled: false
      gateway.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should include wait-for-app init container using global.initImage
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: wait-for-app
          any: true
      - matchRegex:
          path: spec.template.spec.initContainers[0].image
          pattern: "busybox:.*"

  - it: should include checksum/config annotation
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: should set liveness and readiness probes
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /actuator/health/liveness
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /actuator/health/readiness

  - it: should set component label to gateway
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: gateway
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: gateway

  - it: should run as non-root by default
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should set container port from config
    documentSelector:
      path: kind
      value: Deployment
      skipEmptyTemplates: true
    set:
      gateway.enabled: true
      gateway.config.serverPort: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9090
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
