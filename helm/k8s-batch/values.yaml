# ======================================================================
# Global
# ======================================================================
global:
  initImage:
    repository: busybox
    tag: "1.36"

# ======================================================================
# Application
# ======================================================================
app:
  replicaCount: 2

  image:
    repository: ghcr.io/cominotti/k8s-batch
    tag: "latest"
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 1000

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

  springProfile: remote-partitioning

  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []

  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 5
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  service:
    type: ClusterIP
    port: 8080

  config:
    serverPort: 8080
    batchInitializeSchema: never  # DDL created by the MySQL init ConfigMap, not Spring Batch auto-config
    extra: {}

# ======================================================================
# Ingress
# ======================================================================
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: k8s-batch.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ======================================================================
# HPA
# ======================================================================
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5-minute cooldown prevents HPA thrashing during batch bursts
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

# ======================================================================
# MySQL
# ======================================================================
mysql:
  enabled: true

  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent

  auth:
    rootPassword: ""
    database: k8sbatch
    username: k8sbatch
    password: ""
    existingSecret: ""

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  persistence:
    storageClass: ""
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  service:
    type: ClusterIP
    port: 3306

  config:
    mysqlCharacterSetServer: utf8mb4
    mysqlCollationServer: utf8mb4_unicode_ci

# ======================================================================
# Kafka (KRaft mode, no Zookeeper)
# ======================================================================
kafka:
  enabled: true

  image:
    repository: confluentinc/cp-kafka
    tag: "7.9.0"
    pullPolicy: IfNotPresent

  replicaCount: 3

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1536Mi

  persistence:
    storageClass: ""
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  service:
    type: ClusterIP
    port: 9092

  kraft:
    clusterId: ""  # Empty = auto-generated UUID. First pod generates it, shares via /shared emptyDir volume

  topics:
    partitionRequests:
      name: batch-partition-requests
      partitions: 10
      replicationFactor: 2  # Must be <= kafka.replicaCount (E2E overrides to 1 for single-broker)
    partitionReplies:
      name: batch-partition-replies
      partitions: 10
      replicationFactor: 2
    extra: []

# ======================================================================
# Schema Registry (Confluent)
# ======================================================================
schemaRegistry:
  enabled: true

  image:
    repository: confluentinc/cp-schema-registry
    tag: "7.9.0"
    pullPolicy: IfNotPresent

  replicaCount: 1  # Stateless (schemas stored in _schemas Kafka topic); scale for availability only

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 8081

# ======================================================================
# Feature flags
# ======================================================================
features:
  kafka: true
  schemaRegistry: true
  hpa: true
  ingress: false
