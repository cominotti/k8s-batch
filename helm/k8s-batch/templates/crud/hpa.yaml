{{- if and .Values.crudHpa.enabled .Values.crud.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "k8s-batch.fullname" . }}-crud
  labels:
    {{- include "k8s-batch.labels" . | nindent 4 }}
    app.kubernetes.io/component: crud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "k8s-batch.fullname" . }}-crud
  minReplicas: {{ .Values.crudHpa.minReplicas }}
  maxReplicas: {{ .Values.crudHpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.crudHpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.crudHpa.targetMemoryUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.crudHpa.behavior.scaleDown.stabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: {{ .Values.crudHpa.behavior.scaleDown.podScaleDownRate }}
          periodSeconds: {{ .Values.crudHpa.behavior.scaleDown.periodSeconds }}
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.crudHpa.behavior.scaleUp.stabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: {{ .Values.crudHpa.behavior.scaleUp.podScaleUpRate }}
          periodSeconds: {{ .Values.crudHpa.behavior.scaleUp.periodSeconds }}
{{- end }}
