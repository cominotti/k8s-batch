{{- if .Values.crud.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-batch.fullname" . }}-crud-config
  labels:
    {{- include "k8s-batch.labels" . | nindent 4 }}
    app.kubernetes.io/component: crud
data:
  SERVER_PORT: {{ .Values.crud.config.serverPort | quote }}
  # UseContainerSupport reads cgroup memory limits; MaxRAMPercentage caps heap at 75% of container limit
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  # JPA/Hibernate: disable Open Session in View, validate schema against Liquibase-managed DDL
  SPRING_JPA_OPEN_IN_VIEW: "false"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  {{- range $key, $value := .Values.crud.config.extra }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
