{{- if eq .Values.database.type "oracle" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-batch.fullname" . }}-mysql-init
  labels:
    {{- include "k8s-batch.labels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
data:
  01-spring-batch-schema.sql: |
    -- Spring Batch Core Schema for Oracle
    CREATE TABLE BATCH_JOB_INSTANCE (
      JOB_INSTANCE_ID NUMBER(19) NOT NULL PRIMARY KEY,
      VERSION NUMBER(19),
      JOB_NAME VARCHAR2(100) NOT NULL,
      JOB_KEY VARCHAR2(32) NOT NULL,
      CONSTRAINT JOB_INST_UN UNIQUE (JOB_NAME, JOB_KEY)
    );

    CREATE TABLE BATCH_JOB_EXECUTION (
      JOB_EXECUTION_ID NUMBER(19) NOT NULL PRIMARY KEY,
      VERSION NUMBER(19),
      JOB_INSTANCE_ID NUMBER(19) NOT NULL,
      CREATE_TIME TIMESTAMP(6) NOT NULL,
      START_TIME TIMESTAMP(6) DEFAULT NULL,
      END_TIME TIMESTAMP(6) DEFAULT NULL,
      STATUS VARCHAR2(10),
      EXIT_CODE VARCHAR2(2500),
      EXIT_MESSAGE VARCHAR2(2500),
      LAST_UPDATED TIMESTAMP(6),
      CONSTRAINT JOB_INST_EXEC_FK FOREIGN KEY (JOB_INSTANCE_ID)
        REFERENCES BATCH_JOB_INSTANCE(JOB_INSTANCE_ID)
    );

    CREATE TABLE BATCH_JOB_EXECUTION_PARAMS (
      JOB_EXECUTION_ID NUMBER(19) NOT NULL,
      PARAMETER_NAME VARCHAR2(100) NOT NULL,
      PARAMETER_TYPE VARCHAR2(100) NOT NULL,
      PARAMETER_VALUE VARCHAR2(2500),
      IDENTIFYING CHAR(1) NOT NULL,
      CONSTRAINT JOB_EXEC_PARAMS_FK FOREIGN KEY (JOB_EXECUTION_ID)
        REFERENCES BATCH_JOB_EXECUTION(JOB_EXECUTION_ID)
    );

    CREATE TABLE BATCH_STEP_EXECUTION (
      STEP_EXECUTION_ID NUMBER(19) NOT NULL PRIMARY KEY,
      VERSION NUMBER(19) NOT NULL,
      STEP_NAME VARCHAR2(100) NOT NULL,
      JOB_EXECUTION_ID NUMBER(19) NOT NULL,
      CREATE_TIME TIMESTAMP(6) NOT NULL,
      START_TIME TIMESTAMP(6) DEFAULT NULL,
      END_TIME TIMESTAMP(6) DEFAULT NULL,
      STATUS VARCHAR2(10),
      COMMIT_COUNT NUMBER(19),
      READ_COUNT NUMBER(19),
      FILTER_COUNT NUMBER(19),
      WRITE_COUNT NUMBER(19),
      READ_SKIP_COUNT NUMBER(19),
      WRITE_SKIP_COUNT NUMBER(19),
      PROCESS_SKIP_COUNT NUMBER(19),
      ROLLBACK_COUNT NUMBER(19),
      EXIT_CODE VARCHAR2(2500),
      EXIT_MESSAGE VARCHAR2(2500),
      LAST_UPDATED TIMESTAMP(6),
      CONSTRAINT JOB_EXEC_STEP_FK FOREIGN KEY (JOB_EXECUTION_ID)
        REFERENCES BATCH_JOB_EXECUTION(JOB_EXECUTION_ID)
    );

    CREATE TABLE BATCH_STEP_EXECUTION_CONTEXT (
      STEP_EXECUTION_ID NUMBER(19) NOT NULL PRIMARY KEY,
      SHORT_CONTEXT VARCHAR2(2500) NOT NULL,
      SERIALIZED_CONTEXT CLOB,
      CONSTRAINT STEP_EXEC_CTX_FK FOREIGN KEY (STEP_EXECUTION_ID)
        REFERENCES BATCH_STEP_EXECUTION(STEP_EXECUTION_ID)
    );

    CREATE TABLE BATCH_JOB_EXECUTION_CONTEXT (
      JOB_EXECUTION_ID NUMBER(19) NOT NULL PRIMARY KEY,
      SHORT_CONTEXT VARCHAR2(2500) NOT NULL,
      SERIALIZED_CONTEXT CLOB,
      CONSTRAINT JOB_EXEC_CTX_FK FOREIGN KEY (JOB_EXECUTION_ID)
        REFERENCES BATCH_JOB_EXECUTION(JOB_EXECUTION_ID)
    );

    CREATE TABLE BATCH_STEP_EXECUTION_SEQ (
      ID NUMBER(19) NOT NULL,
      UNIQUE_KEY CHAR(1) NOT NULL,
      CONSTRAINT UNIQUE_KEY_UN UNIQUE (UNIQUE_KEY)
    );
    INSERT INTO BATCH_STEP_EXECUTION_SEQ (ID, UNIQUE_KEY)
      SELECT 0, '0' FROM DUAL
      WHERE NOT EXISTS (SELECT * FROM BATCH_STEP_EXECUTION_SEQ);

    CREATE TABLE BATCH_JOB_EXECUTION_SEQ (
      ID NUMBER(19) NOT NULL,
      UNIQUE_KEY CHAR(1) NOT NULL,
      CONSTRAINT UNIQUE_KEY_UN2 UNIQUE (UNIQUE_KEY)
    );
    INSERT INTO BATCH_JOB_EXECUTION_SEQ (ID, UNIQUE_KEY)
      SELECT 0, '0' FROM DUAL
      WHERE NOT EXISTS (SELECT * FROM BATCH_JOB_EXECUTION_SEQ);

    CREATE TABLE BATCH_JOB_INSTANCE_SEQ (
      ID NUMBER(19) NOT NULL,
      UNIQUE_KEY CHAR(1) NOT NULL,
      CONSTRAINT UNIQUE_KEY_UN3 UNIQUE (UNIQUE_KEY)
    );
    INSERT INTO BATCH_JOB_INSTANCE_SEQ (ID, UNIQUE_KEY)
      SELECT 0, '0' FROM DUAL
      WHERE NOT EXISTS (SELECT * FROM BATCH_JOB_INSTANCE_SEQ);
{{- end }}
