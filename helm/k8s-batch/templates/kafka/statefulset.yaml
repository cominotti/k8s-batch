{{- if and .Values.kafka.enabled .Values.features.kafka }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "k8s-batch.fullname" . }}-kafka
  labels:
    {{- include "k8s-batch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  serviceName: {{ include "k8s-batch.fullname" . }}-kafka-headless
  replicas: {{ .Values.kafka.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "k8s-batch.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        {{- include "k8s-batch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kafka
    spec:
      initContainers:
        - name: kafka-init
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          command:
            - bash
            - -c
            - |
              export KAFKA_NODE_ID=${HOSTNAME##*-}

              # Build controller quorum voters
              VOTERS=""
              for i in $(seq 0 {{ sub (int .Values.kafka.replicaCount) 1 }}); do
                if [ -n "$VOTERS" ]; then VOTERS="$VOTERS,"; fi
                VOTERS="${VOTERS}${i}@{{ include "k8s-batch.fullname" . }}-kafka-${i}.{{ include "k8s-batch.fullname" . }}-kafka-headless:9093"
              done

              # Coordinate cluster ID across pods
              # On restart, read existing cluster ID from formatted storage
              if [ -f /data/meta.properties ]; then
                CLUSTER_ID=$(grep 'cluster.id' /data/meta.properties | cut -d= -f2)
              else
                CLUSTER_ID="{{ .Values.kafka.kraft.clusterId | default "" }}"
                if [ -z "$CLUSTER_ID" ]; then
                  if [ "$KAFKA_NODE_ID" = "0" ]; then
                    CLUSTER_ID=$(kafka-storage random-uuid)
                  else
                    while [ ! -f /shared/cluster-id ]; do sleep 1; done
                    CLUSTER_ID=$(cat /shared/cluster-id)
                  fi
                fi
                kafka-storage format -t "$CLUSTER_ID" \
                  -c /etc/kafka/kraft/server.properties \
                  --ignore-formatted
              fi
              echo "$CLUSTER_ID" > /shared/cluster-id
              echo "$VOTERS" > /shared/voters
          volumeMounts:
            - name: data
              mountPath: /data
            - name: shared
              mountPath: /shared
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          command:
            - bash
            - -c
            - |
              export KAFKA_NODE_ID=${HOSTNAME##*-}
              export CLUSTER_ID=$(cat /shared/cluster-id)
              export KAFKA_CONTROLLER_QUORUM_VOTERS=$(cat /shared/voters)
              /etc/confluent/docker/run
          ports:
            - name: client
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(POD_NAME).{{ include "k8s-batch.fullname" . }}-kafka-headless:9092"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_LOG_DIRS
              value: /data
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: shared
              mountPath: /shared
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: shared
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.kafka.persistence.accessModes | nindent 10 }}
        {{- if .Values.kafka.persistence.storageClass }}
        storageClassName: {{ .Values.kafka.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.persistence.size }}
{{- end }}
