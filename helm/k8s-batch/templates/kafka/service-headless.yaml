{{- if and .Values.kafka.enabled .Values.features.kafka }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-batch.fullname" . }}-kafka-headless
  labels:
    {{- include "k8s-batch.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: client
      port: {{ .Values.kafka.service.port }}
      targetPort: client
    - name: controller
      port: 9093
      targetPort: controller
  selector:
    {{- include "k8s-batch.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
{{- end }}
