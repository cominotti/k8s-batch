{{- if and .Values.kafka.enabled .Values.features.kafka }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "k8s-batch.fullname" . }}-kafka-topics
  labels:
    {{- include "k8s-batch.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    # Deletes previous Job before creating a new one (avoids 'already exists' on upgrade)
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      # Explicit pod labels are required because E2E tests apply this Job via Fabric8
      # createOr(update) which uses PUT — K8s auto-generates selectors only on POST,
      # so PUT without labels fails with "spec.selector: Required value"
      labels:
        {{- include "k8s-batch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kafka-topics
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: "{{ .Values.global.initImage.repository }}:{{ .Values.global.initImage.tag }}"
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "k8s-batch.fullname" . }}-kafka {{ .Values.kafka.service.port }}; do
                echo "Waiting for Kafka broker..."
                sleep 5
              done
      containers:
        - name: create-topics
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          command:
            - bash
            - -c
            - |
              BOOTSTRAP="{{ include "k8s-batch.fullname" . }}-kafka:{{ .Values.kafka.service.port }}"

              {{- /* Iterate named topic entries (skip 'extra' which is a list, not a topic map) */ -}}
              {{- range $key, $val := .Values.kafka.topics }}
              {{- if and (ne $key "extra") $val.name }}

              kafka-topics --bootstrap-server $BOOTSTRAP \
                --create --if-not-exists \
                --topic {{ $val.name }} \
                --partitions {{ $val.partitions }} \
                --replication-factor {{ $val.replicationFactor }}
              {{- end }}
              {{- end }}

              {{- range .Values.kafka.topics.extra }}

              kafka-topics --bootstrap-server $BOOTSTRAP \
                --create --if-not-exists \
                --topic {{ .name }} \
                --partitions {{ .partitions }} \
                --replication-factor {{ .replicationFactor }}
              {{- end }}

              echo "All topics created successfully."
{{- end }}
