spring:
  jpa:
    open-in-view: false
    hibernate:
      # Validates that JPA entity mappings match the Liquibase-managed schema at startup.
      # If they drift, context startup fails with SchemaManagementException.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  main:
    banner-mode: off
