server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: k8s-batch
  profiles:
    default: remote-partitioning

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/k8sbatch?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:k8sbatch}
    password: ${SPRING_DATASOURCE_PASSWORD:k8sbatch_secret}
    driver-class-name: com.mysql.cj.jdbc.Driver

  batch:
    jdbc:
      initialize-schema: ${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA:always}
    job:
      enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

batch:
  partition:
    grid-size: ${BATCH_PARTITION_GRID_SIZE:4}
    chunk-size: ${BATCH_PARTITION_CHUNK_SIZE:100}
    timeout-ms: ${BATCH_PARTITION_TIMEOUT_MS:60000}
