server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: k8s-batch
  profiles:
    # Default profile — loads RemotePartitioningJobConfig (Kafka-based).
    # Use --spring.profiles.active=standalone to switch to TaskExecutorPartitionHandler (no Kafka).
    default: remote-partitioning

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/k8sbatch?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:k8sbatch}
    password: ${SPRING_DATASOURCE_PASSWORD:k8sbatch_secret}
    driver-class-name: com.mysql.cj.jdbc.Driver

  batch:
    jdbc:
      # Default: always (for local dev). Helm overrides to "never" because the MySQL init
      # ConfigMap creates the Spring Batch DDL before the app starts.
      initialize-schema: ${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA:always}
    job:
      # Prevent auto-launching jobs at startup — jobs are triggered via the REST API
      enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate is needed because the Spring Batch tables are created by the MySQL
    # init script (not Flyway), so Flyway must treat the pre-existing schema as baseline
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        # Enables separate /actuator/health/liveness and /actuator/health/readiness endpoints
        # for Kubernetes liveness/readiness probes
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

batch:
  partition:
    grid-size: ${BATCH_PARTITION_GRID_SIZE:4}
    chunk-size: ${BATCH_PARTITION_CHUNK_SIZE:100}
    # Remote partitioning manager polling timeout. Standalone mode ignores this
    # (TaskExecutorPartitionHandler has no timeout API — JUnit @Timeout is the backstop).
    timeout-ms: ${BATCH_PARTITION_TIMEOUT_MS:60000}
